<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dynamic Test Solutions – Coming Soon</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: #0d0d0d;
      color: #ffffff;
      font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
    }

    .logo-wrap {
      margin-bottom: 3rem;
      animation: fadeInDown 0.8s ease both;
    }

    .logo-wrap img {
      max-width: 260px;
      width: 50vw;
    }

    .divider {
      width: 60px;
      height: 3px;
      background: #1db878;
      border-radius: 2px;
      margin: 0 auto 2.5rem;
      animation: fadeIn 1s ease 0.3s both;
    }

    h1 {
      font-size: clamp(1.4rem, 3vw, 2rem);
      font-weight: 300;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #cccccc;
      margin-bottom: 1.2rem;
      animation: fadeIn 1s ease 0.5s both;
    }

    h1 span {
      color: #1db878;
      font-weight: 600;
    }

    p {
      font-size: clamp(0.95rem, 2vw, 1.1rem);
      color: #888;
      letter-spacing: 0.06em;
      line-height: 1.8;
      max-width: 480px;
      animation: fadeIn 1s ease 0.7s both;
    }

    p em {
      color: #aaa;
      font-style: normal;
    }

    .tagline {
      margin-top: 2.5rem;
      animation: fadeIn 1s ease 1s both;
    }

    .tagline img {
      max-width: 280px;
      width: 55vw;
      opacity: 0.5;
    }

    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
  </style>
</head>
<body>

  <div class="logo-wrap">
    <img src="DTS-LOGO2-PNG-full-color.png" alt="Dynamic Test Solutions Logo" />
  </div>

  <div class="divider"></div>

  <h1>Currently Under <span>Construction</span></h1>

  <p>
    We test everything —<br>
    <em>including new websites.</em><br><br>
    Check back soon.
  </p>

  <div class="tagline">
    <img src="DTS-TEXT-PNG-full-color.png" alt="Dynamic Test Solutions" />
  </div>

</body>
</html>
